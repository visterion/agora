spring:
  application:
    name: agora
  ai:
    mcp:
      server:
        protocol: STREAMABLE          # Streamable HTTP (SSE is sunset mid-2026)
        type: SYNC
        name: agora
        version: 0.1.0
        streamable-http:
          mcp-endpoint: /mcp
        annotation-scanner:
          enabled: true
  task:
    scheduling:
      pool:
        # FxWarmer and the Saxo token refresher share the @Scheduled thread pool; a single
        # thread (default) lets a slow FX warm starve the session-critical Saxo refresh window.
        size: 2
  lifecycle:
    timeout-per-shutdown-phase: 20s

agora:
  auth:
    # comma-separated accepted bearer tokens (one per consumer); empty = deny all tool calls
    tokens: ${AGORA_AUTH_TOKENS:}
  trading:
    tokens: ${AGORA_TRADING_TOKENS:}
    live-tokens: ${AGORA_TRADING_LIVE_TOKENS:}
    live-tokens-readonly: ${AGORA_TRADING_LIVE_TOKENS_READONLY:}
    # per-request response timeout for broker/OAuth HTTP calls (no fallback chain here;
    # this only bounds hangs — well under the 30s scheduler tick)
    provider-timeout-ms: ${AGORA_TRADING_PROVIDER_TIMEOUT_MS:10000}
    saxo:
      token-dir: ${AGORA_TRADING_SAXO_TOKEN_DIR:/data/saxo}
      refresh-check-ms: ${AGORA_TRADING_SAXO_REFRESH_CHECK_MS:30000}
    connections:
      alpaca-paper:
        provider: alpaca
        environment: paper
        base-url: ${AGORA_TRADING_ALPACA_BASE_URL:https://paper-api.alpaca.markets/v2}
        key-id: ${AGORA_TRADING_ALPACA_KEY_ID:}
        secret: ${AGORA_TRADING_ALPACA_SECRET:}
      alpaca-live:
        provider: alpaca
        environment: live
        base-url: ${AGORA_TRADING_ALPACA_LIVE_BASE_URL:https://api.alpaca.markets/v2}
        key-id: ${AGORA_TRADING_ALPACA_LIVE_KEY_ID:}
        secret: ${AGORA_TRADING_ALPACA_LIVE_SECRET:}
      depot-1:
        provider: saxo
        environment: paper
        base-url: ${AGORA_TRADING_SAXO_SIM_BASE_URL:https://gateway.saxobank.com/sim/openapi}
        key-id: ${AGORA_TRADING_SAXO_SIM_APP_KEY:}
        secret: ${AGORA_TRADING_SAXO_SIM_APP_SECRET:}
        extra:
          redirect-uri: ${AGORA_TRADING_SAXO_SIM_REDIRECT_URI:http://localhost:8091/auth/saxo/callback}
      saxo-live:
        provider: saxo
        environment: live
        base-url: ${AGORA_TRADING_SAXO_LIVE_BASE_URL:https://gateway.saxobank.com/openapi}
        key-id: ${AGORA_TRADING_SAXO_LIVE_APP_KEY:}
        secret: ${AGORA_TRADING_SAXO_LIVE_APP_SECRET:}
        extra:
          redirect-uri: ${AGORA_TRADING_SAXO_LIVE_REDIRECT_URI:}
  fetch:
    # per-request read timeout for reference/fundamentals fetch clients; generous because
    # EDGAR company-facts / filing-text responses are multi-MB. The JDK HttpClient request
    # timeout bounds time-to-headers (and time between subsequent reads), NOT the total time
    # to receive the full body — a slow-but-steady multi-MB body can still take much longer.
    timeout-ms: ${AGORA_FETCH_TIMEOUT_MS:15000}
  data:
    # per-request read timeout for all market-data HTTP providers (fail fast into the next provider)
    provider-timeout-ms: ${AGORA_DATA_PROVIDER_TIMEOUT_MS:4000}
    yahoo:
      base-url: ${AGORA_DATA_YAHOO_BASE_URL:https://query1.finance.yahoo.com}
      timeseries-base-url: ${AGORA_DATA_YAHOO_TIMESERIES_BASE_URL:https://query2.finance.yahoo.com}
      fc-base-url: ${AGORA_DATA_YAHOO_FC_BASE_URL:https://fc.yahoo.com}
      finance-base-url: ${AGORA_DATA_YAHOO_FINANCE_BASE_URL:https://finance.yahoo.com}
      user-agent: ${AGORA_DATA_YAHOO_USER_AGENT:agora/0.1 (+https://github.com/visterion/agora)}
    twelvedata:
      base-url: ${AGORA_DATA_TWELVEDATA_BASE_URL:https://api.twelvedata.com}
      key: ${AGORA_DATA_TWELVEDATA_KEY:}
    finnhub:
      base-url: ${AGORA_DATA_FINNHUB_BASE_URL:https://finnhub.io/api/v1}
      key: ${AGORA_DATA_FINNHUB_KEY:}
    alpaca:
      base-url: ${AGORA_DATA_ALPACA_BASE_URL:https://data.alpaca.markets}
      key-id: ${AGORA_DATA_ALPACA_KEY_ID:}
      secret: ${AGORA_DATA_ALPACA_SECRET:}
    saxo:
      # trading-connection slot whose session feeds market data ("falls vorhanden")
      connection: ${AGORA_DATA_SAXO_CONNECTION:saxo-live}
    edgar:
      user-agent: ${AGORA_DATA_EDGAR_USER_AGENT:agora agora@visterion.de}
      efts-base-url: ${AGORA_DATA_EDGAR_EFTS_BASE_URL:https://efts.sec.gov}
      archive-base: ${AGORA_DATA_EDGAR_ARCHIVE_BASE:https://www.sec.gov}
    wikipedia:
      base-url: ${AGORA_DATA_WIKIPEDIA_BASE_URL:https://en.wikipedia.org}
      user-agent: ${AGORA_DATA_WIKIPEDIA_USER_AGENT:agora/1.0 (research)}
      sp500-page: ${AGORA_DATA_WIKIPEDIA_SP500_PAGE:List of S&P 500 companies}
    sp-press:
      # S&P Dow Jones Indices public press-release RSS feed (index constituent changes).
      base-url: ${AGORA_DATA_SP_PRESS_BASE_URL:https://press.spglobal.com}
      feed-path: ${AGORA_DATA_SP_PRESS_FEED_PATH:/index.php?s=2429&l=100&pagetemplate=rss}
      user-agent: ${AGORA_DATA_SP_PRESS_USER_AGENT:agora/1.0 (research)}
      # Externalised title-classification regexes (comma-separated); prose is brittle, so these
      # are tuned in config, not code. Must not contain a literal comma.
      add-title-patterns: ${AGORA_DATA_SP_PRESS_ADD_TITLE_PATTERNS:(?i)^(.+?)\s+Set to Join S&P 500}
      remove-title-patterns: ${AGORA_DATA_SP_PRESS_REMOVE_TITLE_PATTERNS:(?i)^(.+?)\s+(?:Set to be Removed|to be Removed) from S&P 500}
    russell:
      # FTSE Russell annual US reconstitution (Russell 1000/2000 constituent changes).
      # Additions/deletions come from free, per-date-immutable LSEG PDFs; the R1000-vs-R2000
      # bucket is resolved against the iShares IWB/IWM holdings CSVs (bot-walled from server IPs
      # -> degrades to a default russell2000 bucket, by design).
      lseg-base-url: ${AGORA_DATA_RUSSELL_LSEG_BASE_URL:https://www.lseg.com}
      pdf-path-pattern: ${AGORA_DATA_RUSSELL_PDF_PATH_PATTERN:/content/dam/ftse-russell/en_us/documents/other/{list}-{date}.pdf}
      ishares-base-url: ${AGORA_DATA_RUSSELL_ISHARES_BASE_URL:https://www.ishares.com}
      iwb-path: ${AGORA_DATA_RUSSELL_IWB_PATH:/us/products/239707/ishares-russell-1000-etf/1521942788811.ajax?fileType=csv&fileName=IWB_holdings&dataType=fund}
      iwm-path: ${AGORA_DATA_RUSSELL_IWM_PATH:/us/products/239710/ishares-russell-2000-etf/1467271812596.ajax?fileType=csv&fileName=IWM_holdings&dataType=fund}
      user-agent: ${AGORA_DATA_RUSSELL_USER_AGENT:Mozilla/5.0 (compatible; agora/1.0; research)}
      schedule-resource: ${AGORA_DATA_RUSSELL_SCHEDULE_RESOURCE:russell-schedule.yaml}
      # Days after the effective date the reconstitution window stays "active" (changes still surfaced).
      window-tail-days: ${AGORA_DATA_RUSSELL_WINDOW_TAIL_DAYS:14}
    intraday:
      interval: ${AGORA_DATA_INTRADAY_INTERVAL:5m}
      range: ${AGORA_DATA_INTRADAY_RANGE:1d}
    fx:
      warm-pairs: ${AGORA_DATA_FX_WARM_PAIRS:}
      refresh:
        enabled: ${AGORA_DATA_FX_REFRESH_ENABLED:false}
        initial-delay-ms: ${AGORA_DATA_FX_REFRESH_INITIAL_DELAY_MS:0}
        fixed-delay-ms: ${AGORA_DATA_FX_REFRESH_FIXED_DELAY_MS:1800000}
    cache:
      ttl-seconds: ${AGORA_DATA_CACHE_TTL_SECONDS:120}     # existing: quote/ohlc (Slice 2/3)
      ttl:
        prices-seconds: ${AGORA_DATA_CACHE_TTL_PRICES:120}         # intraday, fx
        news-seconds: ${AGORA_DATA_CACHE_TTL_NEWS:900}
        fundamentals-seconds: ${AGORA_DATA_CACHE_TTL_FUNDAMENTALS:21600}
        filings-seconds: ${AGORA_DATA_CACHE_TTL_FILINGS:3600}
        constituents-seconds: ${AGORA_DATA_CACHE_TTL_CONSTITUENTS:86400}
        splits-seconds: ${AGORA_DATA_CACHE_TTL_SPLITS:21600}
        sp-press-seconds: ${AGORA_DATA_CACHE_TTL_SP_PRESS:3600}                # RSS list (recent releases)
        sp-press-detail-seconds: ${AGORA_DATA_CACHE_TTL_SP_PRESS_DETAIL:604800}  # release bodies (immutable)
        russell-pdf-seconds: ${AGORA_DATA_CACHE_TTL_RUSSELL_PDF:604800}         # reconstitution PDFs (immutable per date)
        russell-ishares-seconds: ${AGORA_DATA_CACHE_TTL_RUSSELL_ISHARES:86400}  # iShares holdings (drift daily)
  research:
    atr-period: ${AGORA_RESEARCH_ATR_PERIOD:22}
    atr-multiple: ${AGORA_RESEARCH_ATR_MULTIPLE:3.0}
    ma-fast: ${AGORA_RESEARCH_MA_FAST:50}
    ma-slow: ${AGORA_RESEARCH_MA_SLOW:200}
    min-bars-52w: ${AGORA_RESEARCH_MIN_BARS_52W:250}
    fetch-days: ${AGORA_RESEARCH_FETCH_DAYS:260}
    default-indicators: ${AGORA_RESEARCH_DEFAULT_INDICATORS:atr,chandelier_stop,ma_cross,52w_range}
    indicators-file: ${AGORA_RESEARCH_INDICATORS_FILE:}
    r-atr-multiple: ${AGORA_RESEARCH_R_ATR_MULTIPLE:3.0}
    r-multiples: ${AGORA_RESEARCH_R_MULTIPLES:1,2,3}

management:
  endpoints:
    web:
      exposure:
        include: health
server:
  port: 8080
  shutdown: graceful
