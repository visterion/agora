spring:
  application:
    name: agora
  ai:
    mcp:
      server:
        protocol: STREAMABLE          # Streamable HTTP (SSE is sunset mid-2026)
        type: SYNC
        name: agora
        version: 0.1.0
        streamable-http:
          mcp-endpoint: /mcp
        annotation-scanner:
          enabled: true

agora:
  auth:
    # comma-separated accepted bearer tokens (one per consumer); empty = deny all tool calls
    tokens: ${AGORA_AUTH_TOKENS:}
  data:
    yahoo:
      base-url: ${AGORA_DATA_YAHOO_BASE_URL:https://query1.finance.yahoo.com}
      user-agent: ${AGORA_DATA_YAHOO_USER_AGENT:Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0 Safari/537.36}
    cache:
      ttl-seconds: ${AGORA_DATA_CACHE_TTL_SECONDS:120}

management:
  endpoints:
    web:
      exposure:
        include: health
server:
  port: 8080
